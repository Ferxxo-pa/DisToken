<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#000000"/>
  <!-- Frame corners -->
  <rect x="80" y="80" width="352" height="352" rx="16" fill="none" stroke="#ffffff" stroke-width="12"/>
  <!-- Inner artwork placeholder (rainbow gradient) -->
  <defs>
    <linearGradient id="art" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9945FF"/>
      <stop offset="50%" stop-color="#627EEA"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
  </defs>
  <rect x="104" y="104" width="304" height="304" rx="8" fill="url(#art)"/>
  <!-- D letter -->
  <text x="256" y="310" font-family="Georgia, serif" font-size="200" font-weight="700" fill="white" text-anchor="middle">D</text>
</svg>
